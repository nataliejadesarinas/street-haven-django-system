<div class="product-card" onclick="openProductModal(this)"
     data-name="{{ product.name }}"
     data-brand="{% if product.brand %}{{ product.brand.name }}{% endif %}"
     data-price="{{ product.price }}"
     data-desc="{{ product.description }}"
     data-img="{% if product.image %}{{ product.image.url }}{% endif %}">

    <div class="product-thumb">
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
        {% else %}
            🛍️
        {% endif %}
        <div class="product-thumb-overlay">👁 QUICK VIEW</div>
        {% if product.stock == 0 %}
            <span class="badge badge-hot">SOLD OUT</span>
        {% endif %}
    </div>

    <div class="product-info">
        <div class="p-brand">
            {% if product.brand %}{{ product.brand.name }}{% endif %}
        </div>
        <div class="p-name">{{ product.name }}</div>
        <div class="p-price">
            <span class="p-now">₱{{ product.price }}</span>
        </div>
        <button class="add-btn">+ ADD TO CART</button>
    </div>
</div>

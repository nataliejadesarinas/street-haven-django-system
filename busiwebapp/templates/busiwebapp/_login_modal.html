{% load static %}

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
    <div class="modal">
        <button class="modal-close" type="button" onclick="closeAllModals()">✕</button>
        <div class="modal-title">WELCOME BACK</div>
        <div class="modal-sub">Sign in to your Street.Haven account</div>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" placeholder="juandc_haven" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="modal-btn">LOGIN</button>
        </form>

        <div class="modal-divider">— OR —</div>
        <button type="button" class="modal-btn-outline" onclick="openSignupModal()">CREATE ACCOUNT</button>
        <div class="modal-switch">No account? <a href="#" onclick="openSignupModal()">Sign up here</a></div>
    </div>
</div>

<!-- REGISTER MODAL -->
<div class="modal-overlay" id="signupModal">
    <div class="modal modal-register">
        <button class="modal-close" type="button" onclick="closeAllModals()">✕</button>
        <div class="modal-title">JOIN THE HAVEN</div>
        <div class="modal-sub">Create your Street.Haven account</div>

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>FULL NAME</label>
                <input type="text" name="name" placeholder="Juan dela Cruz" required>
            </div>
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" placeholder="juandc_haven" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>EMAIL</label>
                <input type="email" name="email" placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>DATE OF BIRTH</label>
                <div class="dob-row">
                    <select class="dob-select" name="dob_month" id="dobMonth">
                        <option value="">Month</option>
                        <option>January</option><option>February</option><option>March</option>
                        <option>April</option><option>May</option><option>June</option>
                        <option>July</option><option>August</option><option>September</option>
                        <option>October</option><option>November</option><option>December</option>
                    </select>
                    <select class="dob-select" name="dob_day" id="dobDay"><option value="">Day</option></select>
                    <select class="dob-select" name="dob_year" id="dobYear"><option value="">Year</option></select>
                </div>
            </div>
            <div class="form-group">
                <label>CONTACT NUMBER</label>
                <input type="tel" name="contact" placeholder="+63 9XX XXX XXXX">
            </div>
            <div class="form-group">
                <label>DELIVERY ADDRESS</label>
                <input type="text" name="address" placeholder="Street, City, Province">
            </div>
            <button type="submit" class="modal-btn">CREATE ACCOUNT</button>
        </form>

        <div class="modal-switch">Already have one? <a href="#" onclick="openLoginModal()">Login here</a></div>
    </div>
</div>
